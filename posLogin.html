<body onload="uidFocus()">
    <div class="spacer">
        &nbsp;
    </div>

    <div class="container">
        <div class="main">
            <h2>
                <img src="images\pA_250.png" alt="posAdvisors">
            </h2>
            <div class="entry">
                <form name='login'>
                    <label>User Name :</label>
                    <input type="text" autocorrect="off" autocapitalize="none" name="UID" id="UID" />
                    <label>Password :</label>
                    <div id="pwdBox" class="input-container">
                        <input id="PWD" type="password" />
                        <i class="material-icons visibility">visibility</i>
                    </div>
                    <label>Drawer :</label>
                    <input type="text" autocomplete="off" autocorrect="off" autocapitalize="none" name="drawer"
                        id="drawer" />
                    <div class="parent">
                        <span id="msg">Your session has expired.</span><br>
                    </div>
                    <div id="buttonDiv">
                        <input type=button value='Login' id="submitBttn" onclick="doLogin()">
                    </div>
                    </form>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('drawer').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                $('#submitBttn').click();
            }
            if (e.key < '0' || e.key > '9') {
                e.preventDefault(); // Prevents the character from being added to the input
            }
        });

        /*  password visiblity stuff  */
        const visibilityToggle = document.querySelector('.visibility');
        const input = document.querySelector('#PWD');
        var password = true;
        visibilityToggle.addEventListener('click', function () {
            if (password) {
                input.setAttribute('type', 'text');
                visibilityToggle.innerHTML = 'visibility_off';
            } else {
                input.setAttribute('type', 'password');
                visibilityToggle.innerHTML = 'visibility';
            }
            password = !password;
        });

        function uidFocus() {
            //--- if chrome auto-fills pswd, color needs to change
            var color = $("#PWD").css("background-color");
            $(".input-container").css({ "background-color": color });

            var oldUID = localStorage.uid;

            if (typeof oldUID === 'string' && oldUID !== 'undefined') {
                $("#UID").val($.trim(oldUID));
                $("#PWD").focus();
            };
        }

        function doLogin() {
            let cUID = $("#UID").val();
            let cPWD = $("#PWD").val();
            let cDrw = $("#drawer").val();

            $("#msg").html('&nbsp;');

            if (cUID === "") {
                $("#msg").html("Please enter a User ID.");
                document.login.UID.focus();
                return;

            } else if (cPWD === "") {
                $("#msg").html("Please enter your password.");
                document.login.PWD.focus();
                return;

            } else if (cDrw === "") {
                $("#msg").html("Please enter your drawer nbr.");
                document.login.drawer.focus();
                return;
            };

            // blank out in case we are here a second (or more) time....
            $("#msg").html("Processing...");

            $.post("posLogin?", { UID: cUID, PWD: cPWD, drawer: cDrw })
                .done(function (obj) {
                    if (obj.result !== "success") {
                        if (obj.hasOwnProperty("msg")) {
                            $("#msg").html(obj.msg);
                        } else {
                            $("#msg").text("Invalid login");
                        }
                    } else {
                        localStorage.setItem('drawer',cDrw);
                        localStorage.setItem('fromLogin', true);
                        localStorage.setItem('cameFrom', 'login');
                        location.replace("pos.html");
                    }
                })
                .fail(function () {
                    $("#msg").html("Unable to connect to server!");
                    return;
                })
        };

        function setCookie(cname, cvalue, exdays) {
            var expires = '';
            if (exdays) {
                var d = new Date();
                d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
                expires = ";expires=" + d.toUTCString();
            }
            document.cookie = cname + "=" + cvalue + expires + ";path=/";
        }

        function getCookie(cname) {
            var name = cname + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }
    </script>
</body>
