  <body onload="uidFocus()">
    <div class="spacer">
        &nbsp;
    </div>

    <div class="container">
        <div class="main">
            <h2>
               <img src="images\pA_250.png" alt="posAdvisors">
            </h2>
            <div class="entry">
                <form name='login'>
                    <label>User Name :</label>
                    <input type="text" autocorrect="off" autocapitalize="none" name="UID" id="UID"/>
                    <label>Password :</label>
                    <div id="pwdBox" class="input-container">
                        <input id="PWD" type="password" />
                        <i class="material-icons visibility">visibility</i>
                    </div>
                    <div class="parent">
                        <span id="msg">&nbsp;</span><br>
                        <input type=button value='Login' id="submit" onclick="doLogin()">
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
    var firstTime = 'no';
    var password2 = true;

    $('#PWD').keypress(function (e) {
      var key = e.which;
      if(key == 13 && firstTime === 'no')  // the enter key code
        {
          $('#submit').click();
          return false;  
        };
    });

    $('#PWD2').keypress(function (e) {
      var key = e.which;
      if(key == 13 && firstTime === 'yes')  // the enter key code
        {
          $('#submit').click();
          return false;  
        };
    });
    
    /*  password visiblity stuff  */
    const visibilityToggle = document.querySelector('.visibility');
    const input = document.querySelector('#PWD');
    var password = true;
    visibilityToggle.addEventListener('click', function() {
        if (password) {
            input.setAttribute('type', 'text');
            visibilityToggle.innerHTML = 'visibility_off';
        } else {
            input.setAttribute('type', 'password');
            visibilityToggle.innerHTML = 'visibility';
        }
        password = !password;
    });

    function uidFocus() {
        //--- if chrome auto-fills pswd, color needs to change
        var color = $("#PWD").css("background-color");
        $(".input-container").css({"background-color": color});

        var oldUID = localStorage.uid;

        if (typeof oldUID === 'string' && oldUID !== 'undefined' ) {
            $("#UID").val( $.trim( oldUID ) );
            $("#PWD").focus();
        };

        $.post( "firstTime?", "", function( obj ) {
            if ( obj.hasOwnProperty("yes") ) {
                firstTime = 'yes';
                $("#pwdBox").after( '<label>Re-Enter :</label><div class="input-container"><input type="password" name="PWD2" id="PWD2"/><i class="material-icons visibility2">visibility</i></div>');
                $("#submit").css('width','55%');
                $("#submit").val("Create Account");
                setCookie( "firstTime", "yes" );
                const visibility2Toggle = document.querySelector('.visibility2');
                const input2 = document.querySelector('#PWD2');
                visibility2Toggle.addEventListener('click', function() {
                    if (password2) {
                        input2.setAttribute('type', 'text');
                        visibility2Toggle.innerHTML = 'visibility_off';
                    } else {
                        input2.setAttribute('type', 'password');
                        visibility2Toggle.innerHTML = 'visibility';
                    }
                    password2 = !password2;
                });
            } else {
                firstTime = 'no';
                setCookie( "firstTime", "no" );
            };
        } );
        //document.login.UID.focus();
    }

    function doLogin() {
      var cUID = $("#UID").val();
      var cPWD = $("#PWD").val();
      var cPWD2;

      if ( firstTime === 'yes') {
          cPWD2 = $("#PWD2").val();
      };

      if ( cUID === "" ) {
         $("#msg").html("Please enter a User ID.");
          document.login.UID.focus();
          return;

      } else if ( cPWD === "" ) {
         $("#msg").html("Please enter your password.");
          document.login.PWD.focus();
          return;

      } else if ( firstTime === 'yes' && cPWD !== cPWD2 ) {
         $("#msg").html("The two password fields do not<br>match. Please re-enter.");
          document.login.PWD.focus();
          return;
      };

      // blank out in case we are here a second (or more) time....
      $("#msg").html("Processing...");
    
      $.post( "login?", { UID: cUID, PWD: cPWD, firstTime: firstTime } )
      .done( function( obj ) {
         if ( obj.result !== "success" ) {
            if ( obj.hasOwnProperty("license")) {
              $("#msg").html("Your subscription is expired.<br>Do you want to upload a new file?");
              $("#submit").val("Upload");
              $("#submit").click(upload)
            } else if ( obj.hasOwnProperty("msg") ) {
              $("#msg").html( obj.msg );
            } else {
              $("#msg").text("Invalid login");
            }
         } else {
            location.replace("split.html");
         }
      })
      .fail( function() {
          $("#msg").html("Unable to connect to server!");
          return;
      })
    };

    function upload() {
        location.replace("upload.html");
    }

    function setCookie(cname, cvalue, exdays) {
        var expires = '';
        if (exdays) {
            var d = new Date();
            d.setTime(d.getTime() + (exdays*24*60*60*1000));
            expires = ";expires="+ d.toUTCString();
        }
        document.cookie = cname + "=" + cvalue + expires + ";path=/";
    }

    function getCookie(cname) {
    var name = cname + "=";
    var ca = document.cookie.split(';');
    for (var i = 0; i < ca.length; i++) {
        var c = ca[i];
        while (c.charAt(0) == ' ') {
            c = c.substring(1);
        }
        if (c.indexOf(name) == 0) {
            return c.substring(name.length, c.length);
        }
    }
    return "";
}

    
    </script>
